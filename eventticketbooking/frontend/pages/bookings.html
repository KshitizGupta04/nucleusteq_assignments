<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings — Eventify</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="bookings.css">
</head>
<body>
    <div class="bookings-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="logo">Eventify</span>
            </div>

            <div class="sidebar-body">
                <h4 class="form-title">Book an Event</h4>
                <form id="bookingForm">
                    <div class="input-group">
                        <label>Number of Tickets</label>
                        <input type="number" id="numberOfTickets" min="1" placeholder="1">
                        <small class="error-text" id="ticketsError"></small>
                    </div>
                    <button type="submit" class="btn btn-primary book-btn">Book Tickets</button>
                </form>
            </div>
        </aside>

        <div class="bookings-main">
            <nav class="top-nav">
                <div class="top-nav-left">
                    <h2>My Bookings</h2>
                </div>
                <div class="top-nav-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"></button>
                    <a href="home.html" class="btn btn-outline">Home</a>
                    <button class="btn btn-danger" onclick="logoutUser()">Logout</button>
                </div>
            </nav>

            <div class="main-content">
                <div class="booking-container" id="bookingContainer"></div>
            </div>
        </div>
    </div>

    <script src="../components/toast.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/eventCard.js"></script>
    <script src="../components/validator.js"></script>
    <script src="../services/bookingService.js"></script>
    <script src="bookings.js"></script>
</body>
</html>
