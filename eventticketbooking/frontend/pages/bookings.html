<!DOCTYPE html>
<html lang="en">

<head>
    <script>

        const savedTheme =

            localStorage.getItem("theme")

            || "dark";

        document.documentElement.setAttribute(

            "data-theme",

            savedTheme
        );

    </script>
    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>
        My Bookings — Eventify
    </title>

    <link
            rel="stylesheet"
            href="../style.css"
    >

    <link
            rel="stylesheet"
            href="bookings.css"
    >

    <style>

        .error-text {

            color: #ef4444;

            font-size: 13px;

            margin-top: 6px;

            display: block;
        }

    </style>

</head>

<body>

<div class="bookings-main">

    <nav class="top-nav">

        <div class="top-nav-left">

            <h2>
                My Bookings
            </h2>

        </div>

        <div class="top-nav-right">

            <button
                    class="theme-toggle"
                    id="themeToggle"
                    onclick="toggleTheme()"
            >

                ☀ Light Mode

            </button>

            <a
                    href="home.html"
                    class="btn btn-outline"
            >

                Home

            </a>

            <button
                    class="btn btn-danger"
                    onclick="logoutUser()"
            >

                Logout

            </button>

        </div>

    </nav>

    <div class="main-content">

        <div
                class="booking-container"
                id="bookingContainer"
        ></div>

    </div>

</div>

<script src="../components/toast.js"></script>

<script src="../components/navbar.js"></script>

<script src="../components/eventCard.js"></script>

<script src="../components/validator.js"></script>

<script src="../services/bookingService.js"></script>

<script src="bookings.js"></script>

</body>
</html>
