<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify — Discover Events</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <section class="hero" id="hero">
        <div class="hero-bg">
            <img src="../assets/concert.png" alt="Event" id="heroBgImg" onerror="this.style.display='none'">
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-content">
            <span class="hero-badge">✦ Live Events Near You</span>
            <h1>Discover <em>Extraordinary</em><br>Experiences</h1>
            <p>Concerts, tech summits, comedy nights, sports<br>and more — all in one place.</p>
            <div class="hero-btns">
                <a href="#events" class="btn btn-primary hero-btn">Explore Events</a>
                <a href="register.html" class="btn btn-ghost hero-btn" id="heroRegisterBtn">Join Free</a>
            </div>
        </div>
    </section>

    <section class="events-section" id="events">
        <div class="container">
            <div class="section-header">
                <h2>Featured Events</h2>
            </div>
            <div class="event-container" id="eventContainer"></div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 Eventify. All Rights Reserved.</p>
    </footer>

    <script src="../components/toast.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/eventCard.js"></script>
    <script src="../services/eventService.js"></script>
    <script src="home.js"></script>
</body>
</html>
