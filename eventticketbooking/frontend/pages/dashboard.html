<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Eventify</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="logo">Eventify</span>
                <span class="sidebar-role">Organiser Panel</span>
            </div>

            <div class="sidebar-body">
                <h4 class="form-title">Create New Event</h4>
                <form id="eventForm">
                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" id="title" placeholder="Event title">
                        <small class="error-text" id="titleError"></small>
                    </div>

                    <div class="input-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Describe your event"></textarea>
                        <small class="error-text" id="descriptionError"></small>
                    </div>

                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="City or venue">
                        <small class="error-text" id="locationError"></small>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Date</label>
                            <input type="date" id="date">
                            <small class="error-text" id="dateError"></small>
                        </div>

                        <div class="input-group">
                            <label>Time</label>
                            <input type="text" id="time" placeholder="7:00 PM">
                            <small class="error-text" id="timeError"></small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Price (₹)</label>
                            <input type="number" id="price" placeholder="0" min="0">
                            <small class="error-text" id="priceError"></small>
                        </div>

                        <div class="input-group">
                            <label>Seats</label>
                            <input type="number" id="availableSeats" placeholder="100" min="1">
                            <small class="error-text" id="seatsError"></small>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Event Image URL</label>
                        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
                        <small class="error-text" id="imageError"></small>
                    </div>

                    <button type="submit" class="btn btn-primary create-btn">Create Event</button>
                </form>
            </div>
        </aside>

        <div class="dashboard-main">
            <nav class="top-nav">
                <div class="top-nav-left">
                    <h2>Your Events</h2>
                </div>
                <div class="top-nav-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"></button>
                    <a href="home.html" class="btn btn-outline">View Site</a>
                    <button class="btn btn-danger" onclick="logoutUser()">Logout</button>
                </div>
            </nav>

            <div class="main-content">
                <div class="event-container" id="eventContainer"></div>
            </div>
        </div>
    </div>

    <script src="../components/toast.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/eventCard.js"></script>
    <script src="../components/validator.js"></script>
    <script src="../services/eventService.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
