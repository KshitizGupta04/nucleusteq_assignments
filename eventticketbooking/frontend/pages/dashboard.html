<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>
        Organizer Dashboard
    </title>

    <link
            rel="stylesheet"
            href="../style.css"
    >

    <link
            rel="stylesheet"
            href="dashboard.css"
    >

</head>

<body>

<div class="dashboard-main">

    <div class="dashboard-topbar">

        <h1 class="dashboard-title">

            Organizer Dashboard

        </h1>

        <div class="topbar-right">

            <div class="search-box">

                <input
                        type="text"
                        id="searchInput"
                        placeholder="Search events..."
                >

            </div>

            <button
                    class="btn btn-primary"
                    onclick="openCreateModal()"
            >

                Create Event

            </button>

        </div>

    </div>

    <div
            class="event-container"
            id="eventContainer"
    ></div>

</div>


<!-- CREATE EVENT MODAL -->

<div
        class="modal"
        id="createEventModal"
        onclick="handleModalClick(event)"
>

    <div class="modal-content">

        <div class="modal-header">

            <h3>Create Event</h3>

            <span
                    class="close-btn"
                    onclick="closeCreateModal()"
            >

                ✕

            </span>

        </div>

        <form id="eventForm">

            <div class="input-group">

                <label>Title</label>

                <input
                        type="text"
                        id="title"
                        name="title"
                        required
                >

                <small
                        class="error-text"
                        id="titleError"
                ></small>

            </div>


            <div class="input-group">

                <label>Description</label>

                <textarea
                        id="description"
                        name="description"
                        required
                ></textarea>

                <small
                        class="error-text"
                        id="descriptionError"
                ></small>

            </div>


            <div class="input-group">

                <label>Location</label>

                <input
                        type="text"
                        id="location"
                        name="location"
                        required
                >

                <small
                        class="error-text"
                        id="locationError"
                ></small>

            </div>


            <div class="form-row">

                <div class="input-group">

                    <label>Date</label>

                    <input
                            type="date"
                            id="date"
                            name="date"
                            required
                    >

                    <small
                            class="error-text"
                            id="dateError"
                    ></small>

                </div>

                <div class="input-group">

                    <label>Time</label>

                    <input
                            type="time"
                            id="time"
                            name="time"
                            required
                    >

                    <small
                            class="error-text"
                            id="timeError"
                    ></small>

                </div>

            </div>


            <div class="form-row">

                <div class="input-group">

                    <label>Price</label>

                    <input
                            type="number"
                            id="price"
                            name="price"
                            min="1"
                            step="1"
                            onwheel="this.blur()"
                            required
                    >

                    <small
                            class="error-text"
                            id="priceError"
                    ></small>

                </div>

                <div class="input-group">

                    <label>Seats</label>

                    <input

                            type="number"

                            id="availableSeats"

                            name="availableSeats"

                            min="1"

                            step="1"

                            inputmode="numeric"

                            onwheel="this.blur()"

                            required
                    >

                    <small
                            class="error-text"
                            id="seatsError"
                    ></small>

                </div>

            </div>


            <div class="input-group">

                <label>Image</label>

                <input
                        type="file"
                        id="image"
                        name="image"
                        accept="image/*"
                >

                <small
                        class="error-text"
                        id="imageError"
                ></small>

            </div>

            <button
                    type="submit"
                    class="btn btn-primary create-btn"
            >

                Create Event

            </button>

        </form>

    </div>

</div>


<!-- EDIT EVENT MODAL -->

<div
        class="modal"
        id="editEventModal"
        onclick="handleEditModalClick(event)"
>

    <div class="modal-content">

        <div class="modal-header">

            <h3>Edit Event</h3>

            <span
                    class="close-btn"
                    onclick="closeEditModal()"
            >

                ✕

            </span>

        </div>

        <form id="editEventForm">

            <input
                    type="hidden"
                    id="editEventId"
            >

            <div class="input-group">

                <label>Title</label>

                <input
                        type="text"
                        id="editTitle"
                        name="title"
                        required
                >

                <small
                        class="error-text"
                        id="editTitleError"
                ></small>

            </div>


            <div class="input-group">

                <label>Description</label>

                <textarea
                        id="editDescription"
                        name="description"
                        required
                ></textarea>

                <small
                        class="error-text"
                        id="editDescriptionError"
                ></small>

            </div>


            <div class="input-group">

                <label>Location</label>

                <input
                        type="text"
                        id="editLocation"
                        name="location"
                        required
                >

                <small
                        class="error-text"
                        id="editLocationError"
                ></small>

            </div>


            <div class="form-row">

                <div class="input-group">

                    <label>Date</label>

                    <input
                            type="date"
                            id="editDate"
                            name="date"
                            required
                    >

                    <small
                            class="error-text"
                            id="editDateError"
                    ></small>

                </div>

                <div class="input-group">

                    <label>Time</label>

                    <input
                            type="time"
                            id="editTime"
                            name="time"
                            required
                    >

                    <small
                            class="error-text"
                            id="editTimeError"
                    ></small>

                </div>

            </div>


            <div class="form-row">

                <div class="input-group">

                    <label>Price</label>

                    <input
                            type="number"
                            id="editPrice"
                            name="price"
                            min="1"
                            step="1"
                            onwheel="this.blur()"
                            required
                    >

                    <small
                            class="error-text"
                            id="editPriceError"
                    ></small>

                </div>

                <div class="input-group">

                    <label>Seats</label>

                    <input

                            type="number"

                            id="editAvailableSeats"

                            name="availableSeats"

                            min="1"

                            step="1"

                            inputmode="numeric"

                            onwheel="this.blur()"

                            required
                    >

                    <small
                            class="error-text"
                            id="editSeatsError"
                    ></small>

                </div>

            </div>


            <div class="input-group">

                <label>Image</label>

                <input
                        type="file"
                        id="editImage"
                        name="image"
                        accept="image/*"
                >

                <small
                        class="error-text"
                        id="editImageError"
                ></small>

            </div>

            <button
                    type="submit"
                    class="btn btn-primary create-btn"
            >

                Update Event

            </button>

        </form>

    </div>

</div>


<!-- BOOKING MODAL -->

<div
        class="modal"
        id="bookingModal"
        onclick="handleBookingModalClick(event)"
>

    <div class="modal-content">

        <div class="modal-header">

            <h3>
                Event Bookings
            </h3>

            <span
                    class="close-btn"
                    onclick="closeBookingModal()"
            >

                ✕

            </span>

        </div>

        <div id="bookingModalBody"></div>

    </div>

</div>


<script src="../components/toast.js"></script>

<script src="../components/navbar.js"></script>

<script src="../components/eventCard.js"></script>

<script src="../components/validator.js"></script>

<script src="../services/eventService.js"></script>

<script src="../services/bookingService.js"></script>

<script src="dashboard.js"></script>

</body>
</html>
